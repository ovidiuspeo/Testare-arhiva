<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Harta Peșteri</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* Zona stângă (fostă hartă) — acum goală */
  #map {
    width: 75%;
    height: 100%;
    background: #f5f5f5; /* un gri deschis, să nu fie alb complet */
    border-right: 2px solid #ccc;
  }

  /* Panou dreapta = 25% */
  #sidebar {
    width: 25%;
    height: 100%;
    overflow-y: auto;
    padding: 10px;
    box-sizing: border-box;
  }

  #codB1Title {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 15px;
    text-align: center;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  th, td {
    border: 1px solid #aaa;
    padding: 6px;
    text-align: left;
  }

  .bulina {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  display: inline-block;
}

.verde {
  background-color: #2ecc71;
}

.rosu {
  background-color: #e74c3c;
}

</style>
</head>

<body>

<!-- Zona de 75% — goală -->
<div id="map"></div>

<!-- Zona de 25% — tabelul -->
