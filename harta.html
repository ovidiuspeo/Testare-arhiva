<!DOCTYPE html>
<!-- ============================
     harta.html — Versiunea 1.50
     Google Maps API
     ============================ -->
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Harta – Selecție Peșteri</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  #map {
    width: 75%;
    height: 100%;
  }

  #sidebar {
    width: 25%;
    height: 100%;
    overflow-y: auto;
    padding: 10px;
    box-sizing: border-box;
    border-left: 2px solid #ccc;
  }

  #title {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 15px;
    text-align: center;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  th, td {
    border: 1px solid #aaa;
    padding: 6px;
  }
</style>

</head>
<body>

<div id="map"></div>

<div id="sidebar">
  <div id="title">Bazinul – <span id="codB1Title"></span></div>

  <button onclick="window.close()" 
          style="padding:5px 10px; font-size:14px; cursor:pointer; margin-bottom:10px;">
      Înapoi
  </button>

  <table id="lista">
    <thead>
      <tr>
        <th>Nr</th>
        <th>Denumire</th>
        <th>Coord</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
// -------------------------------------------------------------
// 1. Citim selecția trimisă din index.html
// -------------------------------------------------------------
const selectie = JSON.parse(localStorage.getItem("selectiePesteri") || "[]");

const codB1 = selectie.length > 0 ? selectie[0].CodB1 : "";
document.getElementById("codB1Title").textContent = codB1;

let map;
let bounds;

// -------------------------------------------------------------
// 2. Inițializăm Google Maps
// -------------------------------------------------------------
function initMap() {
  map = new google.maps.Map(document.getElementById("map"), {
    center: { lat: 45.5, lng: 23.5 },
    zoom: 8,
    mapTypeId: "roadmap",
    mapTypeControl: true,
    mapTypeControlOptions: {
      style: google.maps.MapTypeControlStyle.DROPDOWN_MENU,
      mapTypeIds: ["roadmap", "satellite", "hybrid", "terrain"]
    }
  });

  bounds = new google.maps.LatLngBounds();

  afiseazaPesteri();
}

// -------------------------------------------------------------
// 3. Afișăm marker-ele și tabelul
// -------------------------------------------------------------
function afiseazaPesteri() {
  const tbody = document.querySelector("#lista tbody");
  tbody.innerHTML = "";

  selectie.forEach((p) => {
    let culoare = p.Latit && p.Long ? "green" : "red";

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${p.NrP1}</td>
      <td>${p.Denumire}</td>
      <td style="text-align:center;">
        <span style="
          display:inline-block;
          width:14px;
          height:14px;
          border-radius:50%;
          background:${culoare};
          border:1px solid #555;
        "></span>
      </td>
    `;
    tbody.appendChild(tr);

    if (p.Latit && p.Long) {
      const pos = { lat: p.Latit, lng: p.Long };

      const marker = new google.maps.Marker({
        position: pos,
        map: map,
        title: p.Denumire
      });

      const info = new google.maps.InfoWindow({
        content: `
          <div style="font-size:14px; line-height:1.3;">
            <b>${p.CodB1}/${p.NrP1}</b><br>
            ${p.Denumire}<br>
            Lat: ${p.Latit}<br>
            Long: ${p.Long}
          </div>
        `
      });

      marker.addListener("click", () => info.open(map, marker));

      bounds.extend(pos);
    }
  });

  if (!bounds.isEmpty()) {
    map.fitBounds(bounds);
  }
}
</script>

<script async
  src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY_HERE&callback=initMap">
</script>

</body>
</html>
