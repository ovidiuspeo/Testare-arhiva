<!DOCTYPE html>
<!-- ============================
     harta.html — Versiunea 1.38
     ============================ -->
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Harta – Selecție Peșteri</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }
  #map { width: 75%; height: 100%; }
  #sidebar {
    width: 25%;
    height: 100%;
    overflow-y: auto;
    padding: 10px;
    box-sizing: border-box;
    border-left: 2px solid #ccc;
  }
  #title {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 15px;
    text-align: center;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  th, td {
    border: 1px solid #aaa;
    padding: 6px;
  }
</style>

<link rel="stylesheet" href="https://unpkg.com" />
<script src="https://unpkg.com"></script>
</head>
<body>

<div id="map"></div>

<div id="sidebar">
  <div id="title">Bazinul – <span id="codB1Title"></span></div>
  <button onclick="window.close()" style="padding:5px 10px; font-size:14px; cursor:pointer; margin-bottom:10px;">
    Înapoi
  </button>

  <table id="lista">
    <thead>
      <tr><th>Nr</th><th>Denumire</th><th>Coord</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
// -------------------------------------------------------------
// 1. Citim selecția trimisă din index.html
// -------------------------------------------------------------
const selectie = JSON.parse(localStorage.getItem("selectiePesteri") || "[]");
const codB1 = selectie.length > 0 ? selectie[0].CodB1 : "";
document.getElementById("codB1Title").textContent = codB1;

// -------------------------------------------------------------
// 2. Inițializăm harta
// -------------------------------------------------------------
const map = L.map('map').setView([45.5, 23.5], 8);

// === Layer 1: OpenStreetMap (Harta standard cu străzi) ===
const osmLayer = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  { 
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap'
  }
).addTo(map); // Adăugat implicit la pornire

// === Layer 2: Esri Satellite (Imagini satelit reale globale) ===
const esriSat = L.tileLayer(
  'https://arcgisonline.com{z}/{y}/{x}',
  {
    maxZoom: 19,
    attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, GeoEye, Getmapping, Aerogrid, IGN, IGP'
  }
);

// === Control de layer-e (Butonul din dreapta sus pentru schimbare) ===
L.control.layers(
  {
    "Harta Străzi (OSM)": osmLayer,
    "Satelit Real (Esri)": esriSat
  }
).addTo(map);

const markers = [];

// -------------------------------------------------------------
// 3. Afișăm marker-ele și tabelul
// -------------------------------------------------------------
const tbody = document.querySelector("#lista tbody");
tbody.innerHTML = "";

selectie.forEach((p) => {
  let culoare = "red";
  if (p.Latit && p.Long) culoare = "green";

  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td>${p.NrP1}</td>
    <td>${p.Denumire}</td>
    <td style="text-align:center;">
      <span style="
        display:inline-block;
        width:14px;
        height:14px;
        border-radius:50%;
        background:${culoare};
        border:1px solid #555;
      "></span>
    </td>
  `;
  tbody.appendChild(tr);

  if (p.Latit && p.Long) {
    const m = L.marker([p.Latit, p.Long]).addTo(map);
    m.bindPopup(`
      <div style="font-size:14px; line-height:1.3;">
        <b>${p.CodB1}/${p.NrP1}</b><br>
        ${p.Denumire}<br>
        Lat: ${p.Latit}<br>
        Long: ${p.Long}
      </div>
    `);
    markers.push(m);
  }
});

// -------------------------------------------------------------
// 4. Zoom automat pe selecție
// -------------------------------------------------------------
if (markers.length > 0) {
  const group = L.featureGroup(markers);
  map.fitBounds(group.getBounds(), { padding: [20, 20] });
}
</script>

</body>
</html>
