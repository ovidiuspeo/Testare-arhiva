<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Harta – v.1.50</title>

<!-- Unifica localStorage intre index.html si harta.html -->
<base href="/Testare-arhiva/">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  #map {
    width: 75%;
    height: 100%;
  }

  #sidebar {
    width: 25%;
    height: 100%;
    overflow-y: auto;
    padding: 10px;
    box-sizing: border-box;
    border-left: 2px solid #ccc;
  }

  #title {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 15px;
    text-align: center;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  th, td {
    border: 1px solid #aaa;
    padding: 6px;
  }

  /* Cursor crosshair în modul Marcare */
  .map-crosshair {
    cursor: crosshair !important;
  }
</style>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>
<body>

<div id="map"></div>

<div id="sidebar">
  <div id="title">Bazinul – <span id="codB1Title"></span></div>

  <div style="display:flex; align-items:center; gap:20px; margin-bottom:10px;">
    <button onclick="window.close()" 
        style="padding:5px 10px; font-size:14px; cursor:pointer;">
        <b>Inapoi</b>
    </button>

    <label style="display:flex; align-items:center; gap:5px;">
        <input type="checkbox" id="modMarcare" />
        <b>Marcare</b>
    </label>
</div>
  <table id="lista">
    <thead>
      <tr>
        <th>Nr</th>
        <th>Denumire</th>
        <th>M</th>
        <th>Coord</th>,
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
// -------------------------------------------------------------
// 1. Citim selectia trimisa din index.html
// -------------------------------------------------------------
const selectie = JSON.parse(localStorage.getItem("selectiePesteri") || "[]");

// Extragem CodB1
const codB1 = selectie.length > 0 ? selectie[0].CodB1 : "";
document.getElementById("codB1Title").textContent = codB1;

const configMedia = {
    num_alt: "diverse",
    num_foto: "intrari",
    num_sch: "schite",
    num_loc: "localizari",
    num_map: "harti"
};

// -------------------------------------------------------------
// 2. Initializam harta
// -------------------------------------------------------------
const map = L.map('map').setView([45.5, 23.5], 8);

// Control scale
L.control.scale({
    metric: true,
    imperial: false,
    maxWidth: 150
}).addTo(map);

// Layer OSM
const osm = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  { maxZoom: 18 }
).addTo(map);

// Layer satelit ESRI
const esriSat = L.tileLayer(
  'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { maxZoom: 19 }
);

// Control layere
L.control.layers({
  "Harta OSM": osm,
  "Satelit ESRI": esriSat
}).addTo(map);

const markers = [];

// -------------------------------------------------------------
// 3. Afisam marker-ele si tabelul
// -------------------------------------------------------------
const tbody = document.querySelector("#lista tbody");
tbody.innerHTML = "";

selectie.forEach((p) => {

    let culoare = (p.Latit && p.Long) ? "green" : "red";

    const tr = document.createElement("tr");
    tr.innerHTML = `
        <td>${p.NrP1}${p.Var}</td>
        <td>${p.Denumire}</td>
        <td>${p.SitMarc}</td>
        <td style="text-align:center;">
            <span style="
                display:inline-block;
                width:14px;
                height:14px;
                border-radius:50%;
                background:${culoare};
                border:1px solid #555;
            "></span>
        </td>
    `;
    tbody.appendChild(tr);

    if (p.Latit && p.Long) {

    // 2. Construim link-urile EXACT ca în listare.js
    const bucketSchita = configMedia["num_sch"];
    const bucketHarta  = configMedia["num_map"];

    const linkSchita = `https://uymmflfhpeurfiigeivh.supabase.co/storage/v1/object/public/${bucketSchita}/${p.CodB1}/${p.num_sch}`;
    const linkHarta  = `https://uymmflfhpeurfiigeivh.supabase.co/storage/v1/object/public/${bucketHarta}/${p.CodB1}/${p.num_map}`;
      
        const m = L.marker([p.Latit, p.Long]).addTo(map);
        m.bindPopup(`
            <div style="font-size:14px; line-height:1.3;">
                <b>${p.CodB1}/${p.NrP1}${p.Var}</b><br>
                ${p.Denumire}<br>
                Latitudine: ${p.Latit}<br>
                Longitudine: ${p.Long}<br>
                <button onclick="window.open('${linkHarta}', '_blank')" 
                  style="padding:5px 10px; font-size:12px; cursor:pointer; margin-bottom:10px;">
                <b>Harta</b></button>
                <button onclick="window.open('${linkSchita}', '_blank')" 
                  style="padding:5px 10px; font-size:12px; cursor:pointer; margin-bottom:10px;">
                <b>Schita</b></button>
            </div>
        `);
        markers.push(m);
    }
});

// -------------------------------------------------------------
// 4. Zoom automat pe selectie
// -------------------------------------------------------------
if (markers.length > 0) {
    const group = L.featureGroup(markers);
    map.fitBounds(group.getBounds(), { padding: [20, 20] });
}

// -------------------------------------------------------------
// 5. Cursor crosshair în modul Marcare
// -------------------------------------------------------------
document.getElementById("modMarcare").addEventListener("change", function() {
    if (this.checked) {
        map.getContainer().classList.add("map-crosshair");
    } else {
        map.getContainer().classList.remove("map-crosshair");
    }
});

// -------------------------------------------------------------
// 6. Click pe harta → marcare coordonate
// -------------------------------------------------------------
let tempMarker = null;

map.on('click', function(e) {
    const modMarcare = document.getElementById("modMarcare").checked;
    if (!modMarcare) return;

    const nr = prompt("Introdu NrP1 pentru aceasta pestera:");
    if (!nr) {
        alert("Anulat.");
        return;
    }

    const lat = e.latlng.lat.toFixed(6);
    const lon = e.latlng.lng.toFixed(6);

    const ok = confirm(
        "Salvez coordonatele pentru NrP1 " + nr +
        "?\nLat: " + lat + "\nLon: " + lon
    );

    if (!ok) return;

    if (tempMarker) map.removeLayer(tempMarker);

    tempMarker = L.marker([lat, lon]).addTo(map);

    tempMarker.bindPopup(
        "<b>NrP1: " + nr + "</b><br>" +
        "Lat: " + lat + "<br>" +
        "Lon: " + lon + "<br><br>" +
        "Copiaza si pune in baza de date"
    ).openPopup();

    console.log("Coordonate pentru NrP1 " + nr + ": ", lat, lon);
});
</script>

</body>
</html>
