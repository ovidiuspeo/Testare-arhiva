<!DOCTYPE html>
<!-- ============================
     harta.html — Versiunea 1.35
     ============================ -->
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Harta – Selectie Pesteri</title>

<!-- Unifica localStorage intre index.html si harta.html -->
<base href="/Testare-arhiva/">

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  #map {
    width: 75%;
    height: 100%;
  }

  #sidebar {
    width: 25%;
    height: 100%;
    overflow-y: auto;
    padding: 10px;
    box-sizing: border-box;
    border-left: 2px solid #ccc;
  }

  #title {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 15px;
    text-align: center;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  th, td {
    border: 1px solid #aaa;
    padding: 6px;
  }
</style>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>
<body>

<div id="map"></div>

<div id="sidebar">
  <div id="title">Bazinul – <span id="codB1Title"></span></div>

  <!-- v1.32: Inchide DOAR tabul hartii -->
  <button onclick="window.close()" 
          style="padding:5px 10px; font-size:14px; cursor:pointer; margin-bottom:10px;">
      Inapoi
  </button>

 <label style="display:block; margin-bottom:10px;">
    <input type="checkbox" id="modMarcare" />
    Marcare
 </label>


  <table id="lista">
    <thead>
      <tr>
        <th>Nr</th>
        <th>Denumire</th>
        <th>Coord</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
// -------------------------------------------------------------
// 1. Citim selectia trimisa din index.html
// -------------------------------------------------------------
const selectie = JSON.parse(localStorage.getItem("selectiePesteri") || "[]");

// Extragem CodB1 (toate pesterile din selectie au acelasi CodB1)
const codB1 = selectie.length > 0 ? selectie[0].CodB1 : "";
document.getElementById("codB1Title").textContent = codB1;

// -------------------------------------------------------------
// 2. Initializam harta
// -------------------------------------------------------------
const map = L.map('map').setView([45.5, 23.5], 8);

// Add scale control (km / meters)
L.control.scale({
    metric: true,
    imperial: false,
    maxWidth: 150
}).addTo(map);

// Layer OSM (implicit)
const osm = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  { maxZoom: 18 }
).addTo(map);

// Layer satelit ESRI
const esriSat = L.tileLayer(
  'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  { maxZoom: 19 }
);

// Control de layere (comutator)
const baseLayers = {
  "Harta OSM": osm,
  "Satelit ESRI": esriSat
};

L.control.layers(baseLayers).addTo(map);

const markers = [];

// -------------------------------------------------------------
// 3. Afisam marker-ele si tabelul
// -------------------------------------------------------------
const tbody = document.querySelector("#lista tbody");
tbody.innerHTML = "";

selectie.forEach((p) => {

    // determinam culoarea bulinei
    let culoare = "red"; // implicit: fara coordonate

    if (p.Latit && p.Long) {
        culoare = "green"; // coordonate precise
    }

    // tabel
    const tr = document.createElement("tr");
    tr.innerHTML = `
        <td>${p.NrP1}</td>
        <td>${p.Denumire}</td>
        <td style="text-align:center;">
            <span style="
                display:inline-block;
                width:14px;
                height:14px;
                border-radius:50%;
                background:${culoare};
                border:1px solid #555;
            "></span>
        </td>
    `;
    tbody.appendChild(tr);

    // marker pe harta
    if (p.Latit && p.Long) {
        const m = L.marker([p.Latit, p.Long]).addTo(map);
        m.bindPopup(`
            <div style="font-size:14px; line-height:1.3;">
                <b>${p.CodB1}/${p.NrP1}</b><br>
                ${p.Denumire}<br>
                Lat: ${p.Latit}<br>
                Long: ${p.Long}
            </div>
        `);
        markers.push(m);
    }
});

// -------------------------------------------------------------
// 4. Zoom automat pe selectie
// -------------------------------------------------------------
if (markers.length > 0) {
    const group = L.featureGroup(markers);
    map.fitBounds(group.getBounds(), { padding: [20, 20] });
}

// Mode for placing a marker and reading coordinates
let tempMarker = null;

map.on('click', function(e) {
    const modMarcare = document.getElementById("modMarcare").checked;

    // If marking mode is OFF, do nothing
    if (!modMarcare) return;

    // Ask user for NrP1
    const nr = prompt("Introdu NrP1 pentru aceasta pestera:");

    if (!nr) {
        alert("Anulat.");
        return;
    }

    const lat = e.latlng.lat.toFixed(6);
    const lon = e.latlng.lng.toFixed(6);

    // Confirm saving
    const ok = confirm(
        "Salvez coordonatele pentru NrP1 " + nr +
        "?\nLat: " + lat + "\nLon: " + lon
    );

    if (!ok) return;

    // Remove previous temporary marker
    if (tempMarker) {
        map.removeLayer(tempMarker);
    }

    // Add marker
    tempMarker = L.marker([lat, lon]).addTo(map);

    tempMarker.bindPopup(
        "<b>NrP1: " + nr + "</b><br>" +
        "Lat: " + lat + "<br>" +
        "Lon: " + lon + "<br><br>" +
        "Copiaza si pune in baza de date"
    ).openPopup();

    // Here you will later add saving to database
    console.log("Coordonate pentru NrP1 " + nr + ": ", lat, lon);
});

</script>

</body>
</html>
