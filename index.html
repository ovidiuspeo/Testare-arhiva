<!DOCTYPE html>

<html lang="ro">
<head>

  <title>Listare Peșteri</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.1/dist/umd/supabase.min.js"></script>

  <!-- listare.js v1.33 -->
  <script src="listare.js?v=1.32"></script>

  <script>
    // Conexiune Supabase
    const SUPABASE_URL = "https://uymmflfhpeurfiigeivh.supabase.co";
    const SUPABASE_KEY = "sb_publishable_XQjrq5LLhA4b3O32ioObqQ_PNbJD5E5";
    window.db_supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Login automat dacă ai intrat o dată
    window.addEventListener("load", () => {
      if (localStorage.getItem("logged") === "1") {
        document.getElementById("login").style.display = "none";
        document.getElementById("content").style.display = "block";
      }
    });

    function login() {
      const parola = document.getElementById("pass").value;
      if (parola !== "demo123") {
        alert("Parolă greșită");
        return;
      }
      localStorage.setItem("logged", "1");
      document.getElementById("login").style.display = "none";
      document.getElementById("content").style.display = "block";
    }
  </script>

  <style>
    /* Font Arial pentru tabel */
    #tabelPesteri,
    #tabelPesteri th,
    #tabelPesteri td {
        font-family: Arial, sans-serif !important;
    }

    table {
        border-collapse: collapse;
        width: 100%;
        margin-top: 20px;
    }
    th, td {
        border: 1px solid #999;
        padding: 6px;
        font-size: 14px;
    }
    th {
        background: #eee;
    }

    /* Latimi coloane */
    th[data-coloana="Sel"],
    td[data-coloana="Sel"] {
        width: 30px;
        min-width: 30px;
        max-width: 30px;
        text-align: center;
    }

    th[data-coloana="NrP1"],
    td[data-coloana="NrP1"] {
        width: 40px;
        min-width: 40px;
        max-width: 40px;
        text-align: center;
        white-space: nowrap;
    }

    th[data-coloana="Var"],
    td[data-coloana="Var"] {
        width: 35px;
        min-width: 35px;
        max-width: 35px;
        text-align: center;
        white-space: nowrap;

    th[data-coloana="Denumire"],

        min-width: 250px;
        max-width: 320px;
        white-space: nowrap;
        overflow: hidden;

    th[data-coloana="SinList"],

        min-width: 100px;
        max-width: 320px;
        white-space: nowrap;

    th[data-coloana="Munte"],
    td[data-coloana="Munte"] {
        width: 120px;
        min-width: 100px;
        max-width: 200px;
        text-align: left;
        white-space: nowrap;
    }

    th[data-coloana="Autor"],
    td[data-coloana="Autor"] {
        min-width: 80px;
        max-width: 220px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    th[data-coloana="Club"],
    td[data-coloana="Club"] {
        width: 80px;
        min-width: 60px;
        max-width: 120px;
        text-align: left;
        white-space: nowrap;
    }

    th[data-coloana="Redactor"],

        width: 80px;
        min-width: 60px;
        max-width: 120px;
        text-align: left;
        white-space: nowrap;
    }

    .filter-row input {
        width: 95%;
        padding: 3px;
        box-sizing: border-box;
    }

    fieldset.grup-selectie legend {
        cursor: pointer;
        background: #e0e0e0;
        padding: 4px 10px;
        border-radius: 4px;
        border: 1px solid #888;

        display: inline-block;

  <table id="tabelPesteri">
